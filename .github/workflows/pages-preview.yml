name: Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
    steps:
      - name: Check Cloudflare preview configuration
        id: cloudflare
        shell: bash
        run: |
          if [[ -n "${CLOUDFLARE_API_TOKEN}" && -n "${CLOUDFLARE_ACCOUNT_ID}" && -n "${CLOUDFLARE_PROJECT_NAME}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip preview deployment
        if: ${{ steps.cloudflare.outputs.enabled != 'true' }}
        run: echo "Cloudflare preview secrets are not configured. Skipping preview deployment."

      - name: Checkout
        if: ${{ steps.cloudflare.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ steps.cloudflare.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        if: ${{ steps.cloudflare.outputs.enabled == 'true' }}
        run: npm ci

      - name: Build
        if: ${{ steps.cloudflare.outputs.enabled == 'true' }}
        run: npm run build

      - name: Deploy to Cloudflare Pages (Preview)
        if: ${{ steps.cloudflare.outputs.enabled == 'true' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
