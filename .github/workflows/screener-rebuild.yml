name: Screener Daily Rebuild

on:
  schedule:
    # 05:00 KST = 20:00 UTC (previous day)
    - cron: "0 20 * * *"
  workflow_dispatch:

concurrency:
  group: screener-daily-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger screener rebuild until completion
        env:
          REBUILD_URL: ${{ secrets.SCREENER_REBUILD_URL }}
          SCREENER_ADMIN_TOKEN: ${{ secrets.SCREENER_ADMIN_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.SCREENER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SCREENER_TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SCREENER_SLACK_WEBHOOK_URL }}
          BATCH_SIZE: "20"
          MAX_ATTEMPTS: "180"
          MAX_PHASES: "10"
          SLEEP_SEC: "4"
          NOTIFY_TOPN: "5"
          ALERT_MIN_SCORE: "80"
          ALERT_MIN_DELTA: "5"
          ALERT_COOLDOWN_DAYS: "2"
          VALIDATION_MODE: "auto"
        run: |
          set -euo pipefail

          TOKEN="${SCREENER_ADMIN_TOKEN:-${ADMIN_TOKEN:-}}"

          if [ -z "${REBUILD_URL}" ] || [ -z "${TOKEN}" ]; then
            echo "Required secrets are missing: SCREENER_REBUILD_URL and (SCREENER_ADMIN_TOKEN or ADMIN_TOKEN)."
            exit 1
          fi

          echo "Rebuild URL: ${REBUILD_URL}"
          echo "Batch size: ${BATCH_SIZE}"

          if [[ "${REBUILD_URL}" == *\?* ]]; then
            TARGET_URL="${REBUILD_URL}&batch=${BATCH_SIZE}&alertTopN=${NOTIFY_TOPN}&alertMinScore=${ALERT_MIN_SCORE}&alertMinDelta=${ALERT_MIN_DELTA}&alertCooldownDays=${ALERT_COOLDOWN_DAYS}&validate=${VALIDATION_MODE}"
          else
            TARGET_URL="${REBUILD_URL}?batch=${BATCH_SIZE}&alertTopN=${NOTIFY_TOPN}&alertMinScore=${ALERT_MIN_SCORE}&alertMinDelta=${ALERT_MIN_DELTA}&alertCooldownDays=${ALERT_COOLDOWN_DAYS}&validate=${VALIDATION_MODE}"
          fi

          TRIGGER_URL="${TARGET_URL}&mode=trigger"
          STEP_URL="${TARGET_URL}&mode=step"

          echo "Trigger URL: ${TRIGGER_URL}"
          trigger_tmp="$(mktemp)"
          trigger_code="$(curl -sS -o "${trigger_tmp}" -w "%{http_code}" \
            -X POST "${TRIGGER_URL}" \
            -H "x-admin-token: ${TOKEN}")"
          trigger_body="$(cat "${trigger_tmp}")"
          rm -f "${trigger_tmp}"

          echo "Trigger call: HTTP ${trigger_code}"
          if echo "${trigger_body}" | jq -e . >/dev/null 2>&1; then
            echo "${trigger_body}" | jq -c .
          else
            echo "Non-JSON trigger body:"
            echo "${trigger_body}"
          fi

          if [ "${trigger_code}" != "200" ] && [ "${trigger_code}" != "202" ]; then
            echo "Trigger request failed with HTTP ${trigger_code}"
            exit 1
          fi

          final_body=""
          final_code=""
          phase_index=1
          while [ "${phase_index}" -le "${MAX_PHASES}" ]; do
            echo "Starting phase ${phase_index}/${MAX_PHASES}"
            attempt=1
            prev_progress_key=""
            no_progress_streak=0
            force_mode=0
            phase_body=""
            phase_code=""

            while [ "${attempt}" -le "${MAX_ATTEMPTS}" ]; do
              tmp_file="$(mktemp)"
              request_url="${STEP_URL}"
              if [ "${force_mode}" = "1" ]; then
                request_url="${request_url}&force=1"
              fi
              http_code="$(curl -sS -o "${tmp_file}" -w "%{http_code}" \
                -X POST "${request_url}" \
                -H "x-admin-token: ${TOKEN}")"
              body="$(cat "${tmp_file}")"
              rm -f "${tmp_file}"

              echo "Phase ${phase_index} attempt ${attempt}: HTTP ${http_code}"
              if echo "${body}" | jq -e . >/dev/null 2>&1; then
                echo "${body}" | jq -c .
              else
                echo "Non-JSON response body:"
                echo "${body}"
              fi

              if [ "${http_code}" = "500" ] || [ "${http_code}" = "502" ] || [ "${http_code}" = "503" ] || [ "${http_code}" = "504" ]; then
                echo "Server-side transient error (${http_code}), retrying..."
                attempt=$((attempt + 1))
                sleep "${SLEEP_SEC}"
                continue
              fi

              if [ "${http_code}" != "200" ] && [ "${http_code}" != "202" ]; then
                echo "Unexpected HTTP status ${http_code}"
                exit 1
              fi

              if ! echo "${body}" | jq -e . >/dev/null 2>&1; then
                echo "Expected JSON response but got non-JSON body."
                exit 1
              fi

              ok="$(echo "${body}" | jq -r '.ok // false')"
              if [ "${ok}" != "true" ]; then
                echo "Rebuild API returned ok=false"
                exit 1
              fi

              in_progress="$(echo "${body}" | jq -r '.inProgress // false')"
              processed="$(echo "${body}" | jq -r '.progress.processed // 0')"
              total="$(echo "${body}" | jq -r '.progress.total // 0')"
              echo "Progress: ${processed}/${total}, inProgress=${in_progress}"

              progress_key="${processed}/${total}"
              if [ "${in_progress}" = "true" ] && [ "${progress_key}" = "${prev_progress_key}" ]; then
                no_progress_streak=$((no_progress_streak + 1))
              else
                no_progress_streak=0
                force_mode=0
              fi
              prev_progress_key="${progress_key}"

              if [ "${in_progress}" = "true" ] && [ "${no_progress_streak}" -ge 6 ]; then
                force_mode=1
                echo "No progress for ${no_progress_streak} attempts. Next call will use force=1."
              fi

              if [ "${in_progress}" = "true" ] && [ "${processed}" = "0" ] && [ "${total}" = "0" ]; then
                echo "Lock-only state detected (progress unavailable). Waiting for lock release..."
              fi

              if [ "${in_progress}" = "false" ]; then
                echo "Phase ${phase_index} completed."
                phase_body="${body}"
                phase_code="${http_code}"
                break
              fi

              attempt=$((attempt + 1))
              sleep "${SLEEP_SEC}"
            done

            if [ -z "${phase_body}" ]; then
              echo "Rebuild phase ${phase_index} did not finish within MAX_ATTEMPTS=${MAX_ATTEMPTS}"
              exit 1
            fi

            if [ "${phase_code}" != "200" ]; then
              echo "Rebuild phase ${phase_index} completed with unexpected HTTP status ${phase_code}"
              exit 1
            fi

            final_body="${phase_body}"
            final_code="${phase_code}"
            has_more="$(echo "${final_body}" | jq -r '.hasMore // false')"
            if [ "${has_more}" != "true" ]; then
              break
            fi

            phase_current="$(echo "${final_body}" | jq -r '.phase.current // 0')"
            phase_total="$(echo "${final_body}" | jq -r '.phase.total // 0')"
            next_start="$(echo "${final_body}" | jq -r '.phase.nextStart // 0')"
            processed_now="$(echo "${final_body}" | jq -r '.progress.processed // 0')"
            total_now="$(echo "${final_body}" | jq -r '.progress.total // 0')"
            echo "Chunk rebuild completed: phase ${phase_current}/${phase_total}, processed=${processed_now}/${total_now}, nextStart=${next_start}"

            phase_index=$((phase_index + 1))
            sleep "${SLEEP_SEC}"
          done

          if [ -z "${final_body}" ]; then
            echo "Rebuild did not produce a final response."
            exit 1
          fi

          if [ "${final_code}" != "200" ]; then
            echo "Rebuild completed with unexpected HTTP status ${final_code}"
            exit 1
          fi

          has_more="$(echo "${final_body}" | jq -r '.hasMore // false')"
          if [ "${has_more}" = "true" ]; then
            echo "Rebuild still has remaining chunks after MAX_PHASES=${MAX_PHASES}"
            exit 1
          fi

          as_of="$(echo "${final_body}" | jq -r '.rebuiltAt // .meta.lastUpdatedAt // ""')"
          processed_count="$(echo "${final_body}" | jq -r '.summary.processedCount // 0')"
          candidate_count="$(echo "${final_body}" | jq -r '.summary.candidateCount // 0')"
          failed_count="$(echo "${final_body}" | jq -r '.summary.failedCount // 0')"
          retry_count="$(echo "${final_body}" | jq -r '.summary.retryStats.totalRetries // 0')"
          alert_sent_count="$(echo "${final_body}" | jq -r '.alerts.sentCount // 0')"
          alert_skipped_count="$(echo "${final_body}" | jq -r '.alerts.skippedCount // 0')"

          top_added="$(echo "${final_body}" | jq -r --argjson n "${NOTIFY_TOPN}" '
            [.alerts.eligible.added[0:$n][]? | "신규: \(.name)(\(.code)) #\(.currRank // "-")"] | .[]
          ')"
          top_risers="$(echo "${final_body}" | jq -r --argjson n "${NOTIFY_TOPN}" '
            [.alerts.eligible.risers[0:$n][]? | "상승: \(.name)(\(.code)) #\(.prevRank // "-") -> #\(.currRank // "-")"] | .[]
          ')"
          top_fallers="$(echo "${final_body}" | jq -r --argjson n "${NOTIFY_TOPN}" '
            [.alerts.eligible.fallers[0:$n][]? | "하락: \(.name)(\(.code)) #\(.prevRank // "-") -> #\(.currRank // "-")"] | .[]
          ')"

          message="✅ [스크리너 리빌드 완료]
          시각: ${as_of}
          처리: ${processed_count}개 · 후보: ${candidate_count}개
          실패: ${failed_count}개 · 재시도: ${retry_count}회
          알림: 전송 ${alert_sent_count}건 · 쿨다운 스킵 ${alert_skipped_count}건"

          if [ -n "${top_added}" ]; then
            message="${message}
          ---
          ${top_added}"
          fi
          if [ -n "${top_risers}" ]; then
            message="${message}
          ---
          ${top_risers}"
          fi
          if [ -n "${top_fallers}" ]; then
            message="${message}
          ---
          ${top_fallers}"
          fi

          echo "Notification preview:"
          echo "${message}"

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}" \
              >/dev/null
            echo "Telegram notification sent."
          else
            echo "Telegram secrets are missing. Skip Telegram notification."
          fi

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            slack_payload="$(jq -cn --arg text "${message}" '{text: $text}')"
            curl -sS -X POST "${SLACK_WEBHOOK_URL}" \
              -H "content-type: application/json" \
              -d "${slack_payload}" \
              >/dev/null
            echo "Slack notification sent."
          else
            echo "Slack webhook secret is missing. Skip Slack notification."
          fi
