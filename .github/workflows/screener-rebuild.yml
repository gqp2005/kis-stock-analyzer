name: Screener Daily Rebuild

on:
  schedule:
    # 06:00 KST = 21:00 UTC (previous day)
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: screener-daily-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger screener rebuild until completion
        env:
          REBUILD_URL: ${{ secrets.SCREENER_REBUILD_URL }}
          SCREENER_ADMIN_TOKEN: ${{ secrets.SCREENER_ADMIN_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.SCREENER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SCREENER_TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SCREENER_SLACK_WEBHOOK_URL }}
          BATCH_SIZE: "20"
          MAX_ATTEMPTS: "90"
          SLEEP_SEC: "5"
          NOTIFY_TOPN: "5"
          ALERT_MIN_SCORE: "80"
          ALERT_MIN_DELTA: "5"
          ALERT_COOLDOWN_DAYS: "2"
        run: |
          set -euo pipefail

          TOKEN="${SCREENER_ADMIN_TOKEN:-${ADMIN_TOKEN:-}}"

          if [ -z "${REBUILD_URL}" ] || [ -z "${TOKEN}" ]; then
            echo "Required secrets are missing: SCREENER_REBUILD_URL and (SCREENER_ADMIN_TOKEN or ADMIN_TOKEN)."
            exit 1
          fi

          echo "Rebuild URL: ${REBUILD_URL}"
          echo "Batch size: ${BATCH_SIZE}"

          if [[ "${REBUILD_URL}" == *\?* ]]; then
            TARGET_URL="${REBUILD_URL}&batch=${BATCH_SIZE}&alertTopN=${NOTIFY_TOPN}&alertMinScore=${ALERT_MIN_SCORE}&alertMinDelta=${ALERT_MIN_DELTA}&alertCooldownDays=${ALERT_COOLDOWN_DAYS}"
          else
            TARGET_URL="${REBUILD_URL}?batch=${BATCH_SIZE}&alertTopN=${NOTIFY_TOPN}&alertMinScore=${ALERT_MIN_SCORE}&alertMinDelta=${ALERT_MIN_DELTA}&alertCooldownDays=${ALERT_COOLDOWN_DAYS}"
          fi

          attempt=1
          final_body=""
          final_code=""
          while [ "${attempt}" -le "${MAX_ATTEMPTS}" ]; do
            tmp_file="$(mktemp)"
            http_code="$(curl -sS -o "${tmp_file}" -w "%{http_code}" \
              -X POST "${TARGET_URL}" \
              -H "x-admin-token: ${TOKEN}")"
            body="$(cat "${tmp_file}")"
            rm -f "${tmp_file}"

            echo "Attempt ${attempt}: HTTP ${http_code}"
            if echo "${body}" | jq -e . >/dev/null 2>&1; then
              echo "${body}" | jq -c .
            else
              echo "Non-JSON response body:"
              echo "${body}"
            fi

            if [ "${http_code}" = "500" ] || [ "${http_code}" = "502" ] || [ "${http_code}" = "503" ] || [ "${http_code}" = "504" ]; then
              echo "Server-side transient error (${http_code}), retrying..."
              attempt=$((attempt + 1))
              sleep "${SLEEP_SEC}"
              continue
            fi

            if [ "${http_code}" != "200" ] && [ "${http_code}" != "202" ]; then
              echo "Unexpected HTTP status ${http_code}"
              exit 1
            fi

            if ! echo "${body}" | jq -e . >/dev/null 2>&1; then
              echo "Expected JSON response but got non-JSON body."
              exit 1
            fi

            ok="$(echo "${body}" | jq -r '.ok // false')"
            if [ "${ok}" != "true" ]; then
              echo "Rebuild API returned ok=false"
              exit 1
            fi

            in_progress="$(echo "${body}" | jq -r '.inProgress // false')"
            processed="$(echo "${body}" | jq -r '.progress.processed // 0')"
            total="$(echo "${body}" | jq -r '.progress.total // 0')"
            echo "Progress: ${processed}/${total}, inProgress=${in_progress}"

            if [ "${in_progress}" = "true" ] && [ "${processed}" = "0" ] && [ "${total}" = "0" ]; then
              echo "Lock-only state detected (progress unavailable). Waiting for lock release..."
            fi

            if [ "${in_progress}" = "false" ]; then
              echo "Rebuild completed."
              final_body="${body}"
              final_code="${http_code}"
              break
            fi

            attempt=$((attempt + 1))
            sleep "${SLEEP_SEC}"
          done

          if [ -z "${final_body}" ]; then
            echo "Rebuild did not finish within MAX_ATTEMPTS=${MAX_ATTEMPTS}"
            exit 1
          fi

          if [ "${final_code}" != "200" ]; then
            echo "Rebuild completed with unexpected HTTP status ${final_code}"
            exit 1
          fi

          as_of="$(echo "${final_body}" | jq -r '.rebuiltAt // .meta.lastUpdatedAt // ""')"
          processed_count="$(echo "${final_body}" | jq -r '.summary.processedCount // 0')"
          candidate_count="$(echo "${final_body}" | jq -r '.summary.candidateCount // 0')"
          failed_count="$(echo "${final_body}" | jq -r '.summary.failedCount // 0')"
          retry_count="$(echo "${final_body}" | jq -r '.summary.retryStats.totalRetries // 0')"
          alert_sent_count="$(echo "${final_body}" | jq -r '.alerts.sentCount // 0')"
          alert_skipped_count="$(echo "${final_body}" | jq -r '.alerts.skippedCount // 0')"

          top_added="$(echo "${final_body}" | jq -r --argjson n "${NOTIFY_TOPN}" '
            [.alerts.eligible.added[0:$n][]? | "신규: \(.name)(\(.code)) #\(.currRank // "-")"] | .[]
          ')"
          top_risers="$(echo "${final_body}" | jq -r --argjson n "${NOTIFY_TOPN}" '
            [.alerts.eligible.risers[0:$n][]? | "상승: \(.name)(\(.code)) #\(.prevRank // "-") -> #\(.currRank // "-")"] | .[]
          ')"
          top_fallers="$(echo "${final_body}" | jq -r --argjson n "${NOTIFY_TOPN}" '
            [.alerts.eligible.fallers[0:$n][]? | "하락: \(.name)(\(.code)) #\(.prevRank // "-") -> #\(.currRank // "-")"] | .[]
          ')"

          message="✅ [스크리너 리빌드 완료]
          시각: ${as_of}
          처리: ${processed_count}개 · 후보: ${candidate_count}개
          실패: ${failed_count}개 · 재시도: ${retry_count}회
          알림: 전송 ${alert_sent_count}건 · 쿨다운 스킵 ${alert_skipped_count}건"

          if [ -n "${top_added}" ]; then
            message="${message}
          ---
          ${top_added}"
          fi
          if [ -n "${top_risers}" ]; then
            message="${message}
          ---
          ${top_risers}"
          fi
          if [ -n "${top_fallers}" ]; then
            message="${message}
          ---
          ${top_fallers}"
          fi

          echo "Notification preview:"
          echo "${message}"

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}" \
              >/dev/null
            echo "Telegram notification sent."
          else
            echo "Telegram secrets are missing. Skip Telegram notification."
          fi

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            slack_payload="$(jq -cn --arg text "${message}" '{text: $text}')"
            curl -sS -X POST "${SLACK_WEBHOOK_URL}" \
              -H "content-type: application/json" \
              -d "${slack_payload}" \
              >/dev/null
            echo "Slack notification sent."
          else
            echo "Slack webhook secret is missing. Skip Slack notification."
          fi
