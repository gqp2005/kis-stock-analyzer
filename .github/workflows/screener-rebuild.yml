name: Screener Daily Rebuild

on:
  schedule:
    # 06:00 KST = 21:00 UTC (previous day)
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: screener-daily-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger screener rebuild until completion
        env:
          REBUILD_URL: ${{ secrets.SCREENER_REBUILD_URL }}
          SCREENER_ADMIN_TOKEN: ${{ secrets.SCREENER_ADMIN_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          BATCH_SIZE: "20"
          MAX_ATTEMPTS: "45"
          SLEEP_SEC: "5"
        run: |
          set -euo pipefail

          TOKEN="${SCREENER_ADMIN_TOKEN:-${ADMIN_TOKEN:-}}"

          if [ -z "${REBUILD_URL}" ] || [ -z "${TOKEN}" ]; then
            echo "Required secrets are missing: SCREENER_REBUILD_URL and (SCREENER_ADMIN_TOKEN or ADMIN_TOKEN)."
            exit 1
          fi

          echo "Rebuild URL: ${REBUILD_URL}"
          echo "Batch size: ${BATCH_SIZE}"

          attempt=1
          while [ "${attempt}" -le "${MAX_ATTEMPTS}" ]; do
            tmp_file="$(mktemp)"
            http_code="$(curl -sS -o "${tmp_file}" -w "%{http_code}" \
              -X POST "${REBUILD_URL}?batch=${BATCH_SIZE}" \
              -H "x-admin-token: ${TOKEN}")"
            body="$(cat "${tmp_file}")"
            rm -f "${tmp_file}"

            echo "Attempt ${attempt}: HTTP ${http_code}"
            echo "${body}" | jq -c . || true

            if [ "${http_code}" != "200" ] && [ "${http_code}" != "202" ]; then
              echo "Unexpected HTTP status ${http_code}"
              exit 1
            fi

            ok="$(echo "${body}" | jq -r '.ok // false')"
            if [ "${ok}" != "true" ]; then
              echo "Rebuild API returned ok=false"
              exit 1
            fi

            in_progress="$(echo "${body}" | jq -r '.inProgress // false')"
            processed="$(echo "${body}" | jq -r '.progress.processed // 0')"
            total="$(echo "${body}" | jq -r '.progress.total // 0')"
            echo "Progress: ${processed}/${total}, inProgress=${in_progress}"

            if [ "${in_progress}" = "false" ]; then
              echo "Rebuild completed."
              exit 0
            fi

            attempt=$((attempt + 1))
            sleep "${SLEEP_SEC}"
          done

          echo "Rebuild did not finish within MAX_ATTEMPTS=${MAX_ATTEMPTS}"
          exit 1
